<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 140px;
      padding: 20px 8px 8px 8px;
      font-family: 'Google Sans', Roboto, sans-serif;
      font-size: 12px;
      margin: 0;
    }
    button {
      width: 100%;
      padding: 6px 12px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
    }
    button:hover {
      background: #1557b0;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    #copy-diff-btn {
      display: none;
      margin-top: 6px;
      background: #34a853;
    }
    #copy-diff-btn:hover {
      background: #2d9249;
    }
    #copy-diff-btn:disabled {
      background: #ccc;
    }
    .status {
      margin-top: 8px;
      text-align: center;
      font-size: 12px;
      color: #666;
    }
    .status.success {
      color: #34a853;
    }
    .status.error {
      color: #d93025;
    }
  </style>
</head>
<body>
  <button id="copy-btn">Copy Captions</button>
  <button id="copy-diff-btn">Copy Diff</button>
  <div id="status" class="status"></div>
  <script src="popup.js"></script>
</body>
</html>
